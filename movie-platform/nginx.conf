# =====================
# 电影票务平台 - Nginx 配置
# 部署时将此文件放到 /etc/nginx/sites-available/movie-platform
# =====================

server {
    listen 80;
    # 替换为你的域名或服务器 IP
    server_name 你的域名或IP;

    # 客户端上传文件大小限制（海报图片）
    client_max_body_size 10m;

    # ========================
    # 前端静态文件
    # ========================
    location / {
        root /home/ubuntu/movie-platform/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;  # Vue History 模式
    }

    # ========================
    # Django 后端 API
    # ========================
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ========================
    # 上传的媒体文件（电影海报、头像）
    # ========================
    location /media/ {
        alias /home/ubuntu/movie-platform/backend/media/;
        # 图片缓存 7 天
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ========================
    # Django Admin
    # ========================
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================
    # Django 静态资源（Admin 的 CSS/JS）
    # ========================
    location /static/ {
        alias /home/ubuntu/movie-platform/backend/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ========================
    # Gzip 压缩（节省带宽）
    # ========================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml application/xml;
}
